<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Local Project</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f5f2;
            --panel: #ffffff;
            --border: #dfdfd7;
            --text: #151718;
            --muted: #555955;
            --accent: #1d4ed8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
        }

        h1 { margin: 0 0 8px; font-size: 28px; }
        p { margin: 0; color: var(--muted); }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            background: var(--accent);
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        pre {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fafaf9;
            min-height: 140px;
            overflow: auto;
            font-size: 12px;
        }

        .badge {
            display: inline-block;
            margin-top: 12px;
            border-radius: 999px;
            border: 1px solid #cde1fb;
            background: #eef5ff;
            color: #0f3b84;
            font-size: 12px;
            padding: 4px 10px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Sample Local Project</h1>
        <p>Cookie-authenticated gateway frontend.</p>
        <span class="badge">Project service is running</span>

        <div class="actions">
            <button id="healthBtn">Check /health</button>
            <button id="statusBtn">Check /status</button>
            <button id="commandBtn">POST /commands</button>
        </div>

        <pre id="output">Click a button to test the backend.</pre>
    </main>

    <script>
        const output = document.getElementById("output");
        const gatewayBase = "http://localhost:5000/api/gateway/sample-local-project";

        async function request(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                credentials: "include", // 🔥 IMPORTANT: sends cookie automatically
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                }
            });

            const text = await response.text();
            let body;
            try {
                body = JSON.parse(text);
            } catch {
                body = text;
            }

            output.textContent = JSON.stringify(
                { status: response.status, body },
                null,
                2
            );
        }

        document.getElementById("healthBtn").onclick = () =>
            request("/health");

        document.getElementById("statusBtn").onclick = () =>
            request(`${gatewayBase}/status`);

        document.getElementById("commandBtn").onclick = () =>
            request(`${gatewayBase}/commands`, {
                method: "POST",
                body: JSON.stringify({
                    command: "takeoff",
                    payload: { altitude: 1.2 }
                })
            });
    </script>
</body>

</html>
